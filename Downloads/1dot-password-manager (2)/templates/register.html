{% extends "base.html" %}

{% block title %}Register - 1Dot Password Manager{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-8">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Create Account</h2>
    
    <form method="POST" id="register-form">
        <div class="mb-4">
            <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Username</label>
            <input type="text" id="username" name="username" required
                   class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div class="mb-4">
            <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Master Password</label>
            <input type="password" id="password" name="password" required
                   class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            
            <div id="strength-display" class="mt-2">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-xs font-medium">Strength:</span>
                    <span id="strength-text" class="text-xs font-medium">-</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-1">
                    <div id="strength-bar" class="strength-meter h-1 rounded-full" style="width: 0%"></div>
                </div>
            </div>
            
            <div id="feedback" class="text-xs text-gray-600 mt-2"></div>
        </div>
        
        <div class="mb-6">
            <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
            <input type="password" id="confirm-password" name="confirm-password" required
                   class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <div id="match-feedback" class="text-xs mt-1"></div>
        </div>
        
        <button type="submit" id="submit-btn" disabled
                class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed">
            Create Account
        </button>
    </form>
    
    <p class="text-center text-gray-600 mt-4">
        Already have an account? <a href="{{ url_for('login') }}" class="text-blue-600 hover:underline">Login here</a>
    </p>
</div>

<script>
let passwordStrength = { score: 0 };

document.getElementById('password').addEventListener('input', async function() {
    const password = this.value;
    if (!password) {
        document.getElementById('strength-text').textContent = '-';
        document.getElementById('strength-bar').style.width = '0%';
        document.getElementById('strength-bar').className = 'strength-meter h-1 rounded-full';
        document.getElementById('feedback').innerHTML = '';
        passwordStrength = { score: 0 };
        updateSubmitButton();
        return;
    }
    
    try {
        const response = await fetch('/check_strength', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ password: password })
        });
        
        passwordStrength = await response.json();
        const percentage = (passwordStrength.score / passwordStrength.max_score) * 100;
        
        document.getElementById('strength-text').textContent = passwordStrength.strength;
        document.getElementById('strength-bar').style.width = percentage + '%';
        
        let colorClass = 'bg-red-500';
        if (passwordStrength.color === 'yellow') colorClass = 'bg-yellow-500';
        if (passwordStrength.color === 'green') colorClass = 'bg-green-500';
        
        document.getElementById('strength-bar').className = `strength-meter h-1 rounded-full ${colorClass}`;
        
        if (passwordStrength.feedback.length > 0) {
            document.getElementById('feedback').innerHTML = passwordStrength.feedback.join('<br>');
        } else {
            document.getElementById('feedback').innerHTML = '<span class="text-green-600">Great password!</span>';
        }
        
        updateSubmitButton();
    } catch (error) {
        console.error('Error checking password strength:', error);
    }
});

document.getElementById('confirm-password').addEventListener('input', function() {
    const password = document.getElementById('password').value;
    const confirmPassword = this.value;
    const feedback = document.getElementById('match-feedback');
    
    if (!confirmPassword) {
        feedback.innerHTML = '';
    } else if (password === confirmPassword) {
        feedback.innerHTML = '<span class="text-green-600">✓ Passwords match</span>';
    } else {
        feedback.innerHTML = '<span class="text-red-600">✗ Passwords do not match</span>';
    }
    
    updateSubmitButton();
});

function updateSubmitButton() {
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm-password').value;
    const submitBtn = document.getElementById('submit-btn');
    
    const isValid = password && 
                   confirmPassword && 
                   password === confirmPassword && 
                   passwordStrength.score >= 4; // Require at least medium strength
    
    submitBtn.disabled = !isValid;
}
</script>
{% endblock %}
