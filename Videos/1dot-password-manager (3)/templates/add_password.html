{% extends "base.html" %}

{% block title %}Add Password - 1Dot Password Manager{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-8">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Add New Password</h2>
    
    <form method="POST">
        <div class="mb-4">
            <label for="site_name" class="block text-sm font-medium text-gray-700 mb-2">Site Name</label>
            <input type="text" id="site_name" name="site_name" required
                   placeholder="e.g., Gmail, Facebook, GitHub"
                   class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div class="mb-4">
            <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Username/Email</label>
            <input type="text" id="username" name="username"
                   placeholder="Optional"
                   class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div class="mb-4">
            <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
            <div class="relative">
                <input type="password" id="password" name="password" required
                       class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 pr-20">
                <div class="absolute right-2 top-1/2 transform -translate-y-1/2 flex space-x-1">
                    <button type="button" onclick="togglePasswordVisibility()" 
                            class="text-gray-400 hover:text-gray-600 p-1">
                        <i data-lucide="eye" class="w-4 h-4"></i>
                    </button>
                    <button type="button" onclick="generatePassword()" 
                            class="text-blue-400 hover:text-blue-600 p-1">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
            
            <div id="strength-display" class="mt-2">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-xs font-medium">Strength:</span>
                    <span id="strength-text" class="text-xs font-medium">-</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-1">
                    <div id="strength-bar" class="strength-meter h-1 rounded-full" style="width: 0%"></div>
                </div>
            </div>
            
            <div id="feedback" class="text-xs text-gray-600 mt-2"></div>
        </div>
        
        <!-- Password Generator Options -->
        <div class="mb-6 p-4 bg-gray-50 rounded-lg">
            <h4 class="text-sm font-medium text-gray-700 mb-3">Password Generator</h4>
            <div class="flex items-center space-x-4 mb-3">
                <div class="flex items-center">
                    <label for="length" class="text-xs text-gray-600 mr-2">Length:</label>
                    <input type="range" id="length" min="8" max="32" value="16" 
                           class="w-16" onchange="updateLengthDisplay()">
                    <span id="length-display" class="text-xs text-gray-600 ml-2">16</span>
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="symbols" checked class="mr-1">
                    <label for="symbols" class="text-xs text-gray-600">Symbols</label>
                </div>
            </div>
            <button type="button" onclick="generatePassword()" 
                    class="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded hover:bg-blue-200">
                Generate New Password
            </button>
        </div>
        
        <div class="flex space-x-4">
            <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700">
                Save Password
            </button>
            <a href="{{ url_for('dashboard') }}" 
               class="flex-1 bg-gray-500 text-white py-3 rounded-lg hover:bg-gray-600 text-center">
                Cancel
            </a>
        </div>
    </form>
</div>

<script>
function updateLengthDisplay() {
    const length = document.getElementById('length').value;
    document.getElementById('length-display').textContent = length;
}

async function generatePassword() {
    const length = document.getElementById('length').value;
    const symbols = document.getElementById('symbols').checked;
    
    try {
        const response = await fetch(`/generate_password?length=${length}&symbols=${symbols}`);
        const data = await response.json();
        
        document.getElementById('password').value = data.password;
        
        // Update strength display
        const strength = data.strength;
        const percentage = (strength.score / strength.max_score) * 100;
        
        document.getElementById('strength-text').textContent = strength.strength;
        document.getElementById('strength-bar').style.width = percentage + '%';
        
        let colorClass = 'bg-red-500';
        if (strength.color === 'yellow') colorClass = 'bg-yellow-500';
        if (strength.color === 'green') colorClass = 'bg-green-500';
        
        document.getElementById('strength-bar').className = `strength-meter h-1 rounded-full ${colorClass}`;
        
        if (strength.feedback.length > 0) {
            document.getElementById('feedback').innerHTML = strength.feedback.join('<br>');
        } else {
            document.getElementById('feedback').innerHTML = '<span class="text-green-600">Great password!</span>';
        }
        
    } catch (error) {
        console.error('Error generating password:', error);
    }
}

function togglePasswordVisibility() {
    const field = document.getElementById('password');
    const button = event.target.closest('button');
    
    if (field.type === 'password') {
        field.type = 'text';
        button.innerHTML = '<i data-lucide="eye-off" class="w-4 h-4"></i>';
    } else {
        field.type = 'password';
        button.innerHTML = '<i data-lucide="eye" class="w-4 h-4"></i>';
    }
    lucide.createIcons();
}

// Real-time password strength checking
document.getElementById('password').addEventListener('input', async function() {
    const password = this.value;
    if (!password) {
        document.getElementById('strength-text').textContent = '-';
        document.getElementById('strength-bar').style.width = '0%';
        document.getElementById('strength-bar').className = 'strength-meter h-1 rounded-full';
        document.getElementById('feedback').innerHTML = '';
        return;
    }
    
    try {
        const response = await fetch('/check_strength', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ password: password })
        });
        
        const result = await response.json();
        const percentage = (result.score / result.max_score) * 100;
        
        document.getElementById('strength-text').textContent = result.strength;
        document.getElementById('strength-bar').style.width = percentage + '%';
        
        let colorClass = 'bg-red-500';
        if (result.color === 'yellow') colorClass = 'bg-yellow-500';
        if (result.color === 'green') colorClass = 'bg-green-500';
        
        document.getElementById('strength-bar').className = `strength-meter h-1 rounded-full ${colorClass}`;
        
        if (result.feedback.length > 0) {
            document.getElementById('feedback').innerHTML = result.feedback.join('<br>');
        } else {
            document.getElementById('feedback').innerHTML = '<span class="text-green-600">Great password!</span>';
        }
    } catch (error) {
        console.error('Error checking password strength:', error);
    }
});
</script>
{% endblock %}
